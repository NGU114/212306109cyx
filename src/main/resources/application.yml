# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# Spring 配置
spring:
  application:
    name: hello-server
  datasource:
    url: jdbc:mysql://localhost:3306/lab_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl